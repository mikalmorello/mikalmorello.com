
<h1>Projects</h1>
<section>
  <div ng-controller="ProjectCtrl">
    <div class="container-text"  ng-repeat="project in projects">
        <h2>{{project.title}}</h2>
        <a href="#projects/{{project.title}}" role="button">ISOLATE</a>
        <br />
        <small>{{project.subtitle}}</small>
        <p>{{project.description}}</p>
        <p>{{project.image}}</p>
      </div>
    </div>
  </div>
</section>
