 <main>
  <section>
    <div class="articles-header header">
      <div class="container-header">
        <h1>Articles</h1>
      </div>
    </div>
  </section>
  <section>
    <div class="container-text">
      <div class="card-box" ng-repeat="article in articles">
          <a href="#/articles/{{article.title}}">
            <div class="card-header" ng-style="{'background-image': 'url('+ article.thumbnail +')'}"></div>
            <div class="card-body">
              <h2><a href="#/articles/{{article.title}}">{{article.title}}</a></h2>
            </div>
            <div class="clear"></div>
          </a>
        </div>
      </div>
    </div>
  </section>
</main> 
<footer><div ng-include='"templates/footer.html"'></div></footer>
